<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Contact page to reach out for web development or data projects."
    />

    <title>Contact Us</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <header>
      <h1>Contact Me</h1>

      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="projects.html">Projects</a></li>
          <li><a href="contact.html" class="active" aria-current="page">Contact</a></li>
        </ul>
      </nav>
    </header>

    <main id="main-content">
      <section class="contact-form">
        <h2>Get In Touch</h2>

        <form action="#" method="POST">
          
          <label for="name">Full Name: <span style="color: #b91c1c;">*</span></label>
          <input
            type="text"
            id="name"
            name="name"
            required
            minlength="2"
            placeholder="Your Name"
            autocomplete="name"
            aria-describedby="name-hint"
          />
          <span id="name-hint" class="form-hint" style="display: block; margin-bottom: 1rem; font-size: 0.85rem; color: #475569;">Please enter your first and last name.</span>

          <label for="email">Email Address: <span style="color: #b91c1c;">*</span></label>
          <input
            type="email"
            id="email"
            name="email"
            required
            pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
            placeholder="Your Email"
            autocomplete="email"
            aria-describedby="email-hint"
          />
          <span id="email-hint" class="form-hint" style="display: block; margin-bottom: 1rem; font-size: 0.85rem; color: #475569;">I will use this to get back to you.</span>

          <label for="phone">Phone Number: <span style="color: #b91c1c;">*</span></label>
          <input 
            type="tel" 
            id="phone" 
            name="phone" 
            required
            placeholder="+27 76 379 0913" 
            pattern="[+]?[0-9\s\-]{7,15}" 
            autocomplete="tel" 
            aria-describedby="phone-hint"
          />
          <span id="phone-hint" class="form-hint" style="display: block; margin-bottom: 1rem; font-size: 0.85rem; color: #475569;">Include your country code (e.g., +27).</span>

          <label for="inquiry">Nature of Inquiry: <span style="color: #b91c1c;">*</span></label>
          <select id="inquiry" name="inquiry" required>
            <option value="">Select a topic...</option>
            <option value="webdev">Web Development</option>
            <option value="data">Data Analysis</option>
            <option value="other">Other</option>
          </select>

          <fieldset style="margin-bottom: 1.25rem;">
            <legend>Preferred Contact Method: <span style="color: #b91c1c;">*</span></legend>
            <label for="contact-email">
              <input
                type="radio"
                id="contact-email"
                name="contact-method"
                value="email"
                required
              />
              Email
            </label>
            <label for="contact-phone">
              <input
                type="radio"
                id="contact-phone"
                name="contact-method"
                value="phone"
                required
              />
              Phone
            </label>
          </fieldset>

          <label for="message">Message: <span style="color: #b91c1c;">*</span></label>
          <textarea
            id="message"
            name="message"
            required
            minlength="10"
            placeholder="How can I help you?"
          ></textarea>

          <button type="submit" style="margin-top: 1rem;">Send Message</button>
        </form>
      </section>
    </main>

    <footer>
      <p>Contact me at ntando.molose@umuzi.org</p>
    </footer>

    <!-- Small JS to handle form submission -->
    <script>
      document.addEventListener("DOMContentLoaded", function() {
        const form = document.querySelector("form");

        form.addEventListener("submit", function(event) {
          event.preventDefault(); // Stops the page from reloading/erroring
          
          // Show the success pop-up
          alert("Success! Your message has been sent to Ntando.");
          
          // Clear the form fields so it is ready for a new message
          form.reset();
        });
      });
    </script>
  </body>
</html>
